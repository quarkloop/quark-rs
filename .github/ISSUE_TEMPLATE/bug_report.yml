name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out the sections below to help us reproduce and fix the issue.
        The more detail you provide, the faster we can triage.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproducer. If possible, include the exact commands you ran.
      placeholder: |
        1. Run `...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages, logs, or screenshots if relevant.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Project version
      description: The version of the quarkloop project you're using.
      placeholder: e.g. output of `quark version`, `cargo tree --depth 0`, or commit SHA
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      description: The language runtime you're using.
      placeholder: e.g. Rust 1.97.0, protoc 25.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14, Ubuntu 24.04, Windows 11
    validations:
      required: true
