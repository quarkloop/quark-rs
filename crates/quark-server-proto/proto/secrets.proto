syntax = "proto3";

package platform.secrets.v1;

import "google/protobuf/empty.proto";
import "common/identities.proto";
import "common/paging.proto";

// ===========================================================================
// SecretsService — encrypted key-value store with scoped access + rotation.
// ===========================================================================

service SecretsService {
  // Store a new secret (encrypted at rest via envelope encryption).
  rpc PutSecret(PutSecretRequest) returns (Secret);

  // Fetch + decrypt a secret value. Caller must have secrets.reader role
  // AND belong to the same org as the secret.
  rpc GetSecret(GetSecretRequest) returns (SecretValue);

  // List secret metadata (no values). Same org-scope check.
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);

  // Rotate a secret: increments version, re-encrypts with a new data key.
  rpc RotateSecret(RotateSecretRequest) returns (Secret);

  rpc DeleteSecret(DeleteSecretRequest) returns (google.protobuf.Empty);
}

message Secret {
  string id = 1;
  string name = 2;
  SecretKind kind = 3;
  string org_id = 4;
  optional string project_id = 5;
  uint32 version = 6;             // incremented on each rotation
  platform.common.v1.Timestamps timestamps = 7;
}

enum SecretKind {
  SECRET_KIND_UNSPECIFIED = 0;
  SECRET_KIND_OPAQUE = 1;         // arbitrary blob (cert, key file)
  SECRET_KIND_TOKEN = 2;          // API token / bearer
  SECRET_KIND_PASSWORD = 3;       // password
  SECRET_KIND_KEY_VALUE = 4;      // structured KV
}

message PutSecretRequest {
  string name = 1;
  SecretKind kind = 2;
  string org_id = 3;
  optional string project_id = 4;
  bytes value = 5;                // plaintext; encrypted before storage
}

message GetSecretRequest {
  string id = 1;
}

// Returned by GetSecret: includes the decrypted value.
message SecretValue {
  string id = 1;
  string name = 2;
  bytes value = 3;
  uint32 version = 4;
}

message ListSecretsRequest {
  platform.common.v1.PageQuery query = 1;
  string org_id = 2;
  optional string project_id = 3;
}

message ListSecretsResponse {
  repeated Secret secrets = 1;
  platform.common.v1.PageMeta meta = 2;
}

message RotateSecretRequest {
  string id = 1;
  bytes new_value = 2;
}

message DeleteSecretRequest {
  string id = 1;
}
