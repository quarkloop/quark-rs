syntax = "proto3";

package platform.common.v1;

// Pagination request — every List RPC takes this.
message PageQuery {
  uint32 limit = 1;
  uint32 offset = 2;
}

// Pagination metadata — every List RPC response includes this.
message PageMeta {
  uint64 total = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}
