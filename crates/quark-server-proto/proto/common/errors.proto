syntax = "proto3";

package platform.common.v1;

// Error codes mapped to gRPC status codes by each service's error type.
// Carried in tonic::Status details, not in response message fields.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_NOT_FOUND = 1;
  ERROR_CODE_ALREADY_EXISTS = 2;
  ERROR_CODE_INVALID_ARGUMENT = 3;
  ERROR_CODE_UNAUTHENTICATED = 4;
  ERROR_CODE_PERMISSION_DENIED = 5;
  ERROR_CODE_FAILED_PRECONDITION = 6;
  ERROR_CODE_INTERNAL = 7;
}
