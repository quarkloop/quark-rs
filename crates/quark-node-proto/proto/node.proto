syntax = "proto3";

package quark.node.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// NodeService — the gRPC API for the node execution daemon.
//
// The daemon listens on `--grpc-addr` (default `0.0.0.0:50051`) and serves
// the seven RPCs below. See `docs/content/develop/specs/08-api.mdx` for the
// full API specification and `docs/content/develop/adr/0001-why-grpc.mdx`
// for the architectural rationale.
service NodeService {
  // Execute a node and return the result.
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);

  // Cancel an in-flight execution.
  rpc Cancel(CancelRequest) returns (CancelResponse);

  // Health check — is the daemon process alive?
  rpc Health(HealthRequest) returns (HealthResponse);

  // Ready check — is the daemon ready to accept requests?
  rpc Ready(ReadyRequest) returns (ReadyResponse);

  // Status — detailed runtime status.
  rpc Status(StatusRequest) returns (StatusResponse);

  // Drain — stop accepting new requests, finish in-flight, then return.
  rpc Drain(DrainRequest) returns (DrainResponse);

  // Shutdown — stop the daemon.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

// ─── Execute ─────────────────────────────────────────────────────────────

message ExecuteRequest {
  string api_version = 1;
  string request_id = 2;
  string node_uri = 3;
  google.protobuf.Value input = 4;
  uint64 deadline_ms = 5;
  string mode = 6;
  RequestMetadata metadata = 7;
}

message RequestMetadata {
  string trace_id = 1;
  string span_id = 2;
  string caller_id = 3;
  string caller_ip = 4;
}

message ExecuteResponse {
  string api_version = 1;
  string request_id = 2;
  string status = 3;
  google.protobuf.Value output = 4;
  ApiError error = 5;
  ResponseMetadata metadata = 6;
}

message ResponseMetadata {
  uint64 duration_ms = 1;
  string runtime_version = 2;
  string execution_context = 3;
}

message ApiError {
  string code = 1;
  string message = 2;
  string node_uri = 3;
  google.protobuf.Value details = 4;
}

// ─── Cancel ──────────────────────────────────────────────────────────────

message CancelRequest {
  string api_version = 1;
  string request_id = 2;
  string reason = 3;
}

message CancelResponse {
  string api_version = 1;
  string request_id = 2;
  bool cancelled = 3;
}

// ─── Health / Ready / Status ─────────────────────────────────────────────

message HealthRequest {
  string api_version = 1;
}

message HealthResponse {
  string status = 1;
  uint64 uptime_ms = 2;
  ApiError error = 3;
}

message ReadyRequest {
  string api_version = 1;
}

message ReadyResponse {
  string status = 1;
  bool ready = 2;
  string reason = 3;
}

message StatusRequest {
  string api_version = 1;
}

message StatusResponse {
  string status = 1;
  string host_id = 2;
  string runtime_version = 3;
  uint64 uptime_ms = 4;
  CatalogStatus catalog = 5;
  ExecutionStatus execution = 6;
}

message CatalogStatus {
  uint32 node_count = 1;
  uint64 last_sync_ms = 2;
}

message ExecutionStatus {
  uint32 concurrent = 1;
  uint32 max_concurrent = 2;
  uint32 queued = 3;
  uint32 max_queued = 4;
  uint64 total_executions = 5;
  uint64 total_errors = 6;
}

// ─── Drain / Shutdown ────────────────────────────────────────────────────

message DrainRequest {
  string api_version = 1;
  uint64 timeout_ms = 2;
}

message DrainResponse {
  string status = 1;
  uint32 drained = 2;
}

message ShutdownRequest {
  string api_version = 1;
  bool force = 2;
}

message ShutdownResponse {
  string status = 1;
}
